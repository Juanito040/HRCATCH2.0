<div class="menubar-wrapper">
    <p-menubar [model]="items" styleClass="glass-navbar border-none">
        <ng-template pTemplate="start">
            <div class="logo-container flex align-items-center gap-2 px-2 cursor-pointer" routerLink="/adminbiomedica">
                <img src="LogoAgora.png" height="40" alt="Logo" />
                <div class="flex flex-column">
                    <span class="font-bold text-primary text-lg">{{ themeService.getThemeConfig().appName }}</span>
                    <span class="text-xs text-secondary">Administrador Biom&eacute;dica</span>
                </div>
            </div>
        </ng-template>

        <ng-template pTemplate="end">
            <div class="flex align-items-center gap-2">
                <div class="relative mr-2">
                    <button pButton icon="pi pi-bell"
                            class="p-button-rounded p-button-text p-button-secondary"
                            pTooltip="Alertas de Backup" tooltipPosition="bottom"
                            (click)="opAlertas.toggle($event)">
                    </button>
                    <p-badge *ngIf="notificacionService.conteoAlertas > 0"
                             [value]="notificacionService.conteoAlertas.toString()"
                             severity="danger"
                             styleClass="absolute top-0 right-0 pointer-events-none">
                    </p-badge>
                </div>
                <p-overlayPanel #opAlertas [style]="{ width: '380px' }">
                    <app-panel-alertas-backup></app-panel-alertas-backup>
                </p-overlayPanel>
                <p-avatar icon="pi pi-user" styleClass="mr-2 cursor-pointer" shape="circle"
                    [style]="{'background-color': '#eef2ff', 'color': '#0056b3'}" (click)="viewUser()"
                    pTooltip="Perfil"></p-avatar>
                <button pButton icon="pi pi-power-off" class="p-button-rounded p-button-text p-button-danger"
                    pTooltip="Cerrar Sesión" tooltipPosition="bottom" (click)="navigateToAbout()"></button>
            </div>
        </ng-template>
    </p-menubar>
</div>
