<div class="calendario-container p-4">

    <!-- Cabecera principal -->
    <div class="flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <h2 class="m-0">Calendario de Backups</h2>
        <div class="flex align-items-center gap-2">
            <p-button icon="pi pi-chevron-left" [text]="true" [rounded]="true"
                      (onClick)="mesAnterior()">
            </p-button>
            <span class="titulo-mes">{{ tituloMes }}</span>
            <p-button icon="pi pi-chevron-right" [text]="true" [rounded]="true"
                      (onClick)="mesSiguiente()">
            </p-button>
            <p-datepicker
                [(ngModel)]="fechaSeleccionada"
                view="month"
                dateFormat="mm/yy"
                (onSelect)="onMesCambia($event)"
                [showIcon]="true">
            </p-datepicker>
            <p-button icon="pi pi-refresh" [outlined]="true" label="Actualizar"
                      (onClick)="cargarBackupsDelMes()">
            </p-button>
        </div>
    </div>

    <!-- Leyenda -->
    <div class="flex gap-3 mb-3 flex-wrap">
        <div class="backup-chip backup-chip-completado leyenda-chip">Completado</div>
        <div class="backup-chip backup-chip-fallido leyenda-chip">Fallido</div>
        <div class="backup-chip backup-chip-pendiente leyenda-chip">Pendiente</div>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="flex justify-content-center align-items-center" style="height: 300px;">
        <p-progressSpinner></p-progressSpinner>
    </div>

    <!-- Calendario -->
    <div *ngIf="!loading">
        <!-- Cabecera días de semana -->
        <div class="calendario-grid mb-2">
            <div *ngFor="let dia of diasSemana" class="dia-semana-header-cell">
                {{ dia }}
            </div>
        </div>

        <!-- Semanas -->
        <div class="calendario-grid">
            <ng-container *ngFor="let semana of semanas">
                <div *ngFor="let celda of semana"
                     class="dia-cell"
                     [ngClass]="celda.fecha ? getClaseDia(getBackupsDia(celda.fecha)) : 'dia-vacio'">
                    <div *ngIf="celda.dia" class="dia-numero">{{ celda.dia }}</div>
                    <div class="chips-container" *ngIf="celda.fecha">
                        <div *ngFor="let backup of getBackupsDia(celda.fecha)"
                             class="backup-chip"
                             [ngClass]="getClaseChip(backup.estado)"
                             [pTooltip]="getTextoTooltip(backup)"
                             tooltipPosition="top">
                            {{ backup.sistemaNombre }}
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>

</div>
